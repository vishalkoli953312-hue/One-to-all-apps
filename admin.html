<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV App - Admin Control</title>
    <!-- Google Fonts for Premium Look -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --danger: #ef4444;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text);
            min-height: 100vh;
            padding: 30px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
        }

        /* Glassmorphism Panel */
        .panel {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h2 { margin-bottom: 20px; font-weight: 600; font-size: 1.5rem; color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 10px; }

        label { display: block; margin-top: 15px; font-size: 0.9rem; color: #94a3b8; }

        input[type="text"], input[type="url"] {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }

        /* Sliders */
        .slider-group { margin-top: 20px; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--primary); }

        .btn-create {
            width: 100%;
            padding: 15px;
            margin-top: 25px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-create:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4); }

        /* App List */
        .app-list { display: flex; flex-direction: column; gap: 15px; }
        .app-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--border);
            transition: 0.3s;
        }

        .app-card:hover { background: rgba(255,255,255,0.07); }

        .app-info { display: flex; align-items: center; gap: 15px; }
        .app-info img { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; background: #000; }
        .app-info span { font-weight: 500; }

        .actions { display: flex; gap: 10px; }
        .btn-edit { background: #fbbf24; color: #000; }
        .btn-del { background: var(--danger); color: white; }
        .actions button {
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .actions button:hover { opacity: 0.8; transform: scale(1.05); }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Left Side: Form -->
        <div class="panel">
            <h2>App Create Karein</h2>
            <input type="hidden" id="appId">
            
            <label>App Ka Naam</label>
            <input type="text" id="appName" placeholder="Jaise: Netflix, YouTube">
            
            <label>Website Link / HTML URL</label>
            <input type="text" id="appLink" placeholder="https://example.com">
            
            <label>Icon URL (Khali chhodein auto-detect ke liye)</label>
            <input type="text" id="appIcon" placeholder="https://image-link.png">
            
            <button class="btn-create" onclick="saveApp()">Create / Update App</button>

            <div class="slider-group">
                <h2>User Panel Settings</h2>
                <label>Icon Size: <span id="iconSizeVal">100</span>px</label>
                <input type="range" id="iconSize" min="50" max="250" value="100" oninput="updateSettingsDisplay()">
                
                <label>Text Size: <span id="textSizeVal">16</span>px</label>
                <input type="range" id="textSize" min="12" max="40" value="16" oninput="updateSettingsDisplay()">
                
                <button class="btn-create" style="background: #10b981; margin-top: 15px;" onclick="saveSettings()">Apply Settings</button>
            </div>
        </div>

        <!-- Right Side: List -->
        <div class="panel">
            <h2>Managed Apps</h2>
            <div class="app-list" id="appList">
                <!-- Apps yahan load honge -->
            </div>
        </div>
    </div>

    <script>
        const API = '../api.php'; // PHP file ka path

        // Data load karne ka function
        async function loadData() {
            try {
                const res = await fetch(API);
                const data = await res.json();
                
                // Settings set karein
                document.getElementById('iconSize').value = data.settings.iconSize;
                document.getElementById('textSize').value = data.settings.textSize;
                updateSettingsDisplay();

                // List render karein
                const list = document.getElementById('appList');
                list.innerHTML = '';
                
                if(data.apps.length === 0) {
                    list.innerHTML = '<p style="color: #64748b; text-align:center;">Koi app nahi hai. Naya add karein!</p>';
                }

                data.apps.forEach(app => {
                    list.innerHTML += `
                        <div class="app-card">
                            <div class="app-info">
                                <img src="${app.icon}" onerror="this.src='https://via.placeholder.com/100?text=App'">
                                <span>${app.name}</span>
                            </div>
                            <div class="actions">
                                <button class="btn-edit" onclick="editApp('${app.id}', '${app.name}', '${app.link}', '${app.icon}')">Edit</button>
                                <button class="btn-del" onclick="deleteApp('${app.id}')">Delete</button>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                console.error("Error loading data:", e);
            }
        }

        // App Save / Create function
        async function saveApp() {
            const id = document.getElementById('appId').value;
            const name = document.getElementById('appName').value;
            let link = document.getElementById('appLink').value;
            let icon = document.getElementById('appIcon').value;

            if(!name || !link) return alert("Naam aur Link zaroori hai!");

            // Auto Icon Detection agar icon khali hai
            if (!icon) {
                try {
                    let urlObj = new URL(link);
                    icon = `https://www.google.com/s2/favicons?domain=${urlObj.hostname}&sz=128`;
                } catch(e) {
                    icon = 'https://via.placeholder.com/128?text=' + name[0];
                }
            }

            const response = await fetch(API, {
                method: 'POST',
                body: JSON.stringify({ id, name, link, icon })
            });

            if(response.ok) {
                // Form clear karein
                document.getElementById('appId').value = '';
                document.getElementById('appName').value = '';
                document.getElementById('appLink').value = '';
                document.getElementById('appIcon').value = '';
                loadData();
            }
        }

        // Delete function
        async function deleteApp(id) {
            if(!confirm("Kya aap is app ko hatana chahte hain?")) return;
            await fetch(API, {
                method: 'POST',
                body: JSON.stringify({ action: 'delete', id: id })
            });
            loadData();
        }

        // Edit fill function
        function editApp(id, name, link, icon) {
            document.getElementById('appId').value = id;
            document.getElementById('appName').value = name;
            document.getElementById('appLink').value = link;
            document.getElementById('appIcon').value = icon;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Settings update functions
        function updateSettingsDisplay() {
            document.getElementById('iconSizeVal').innerText = document.getElementById('iconSize').value;
            document.getElementById('textSizeVal').innerText = document.getElementById('textSize').value;
        }

        async function saveSettings() {
            const iconSize = document.getElementById('iconSize').value;
            const textSize = document.getElementById('textSize').value;

            await fetch(API, {
                method: 'POST',
                body: JSON.stringify({ iconSize, textSize })
            });
            alert("Settings Apply Ho Gayi!");
            loadData();
        }

        // Initial Load
        loadData();
    </script>
</body>
</html>
