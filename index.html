<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart TV Home</title>
    <style>
        :root { --bg: #050505; --focus: #3b82f6; }
        body { margin: 0; padding: 40px; background: var(--bg); background-image: radial-gradient(circle at top right, #1e293b, #050505); min-height: 100vh; font-family: 'Segoe UI', sans-serif; color: white; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }
        .tv-grid { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }
        .app-card { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); padding: 25px; border-radius: 25px;
            backdrop-filter: blur(10px); border: 2px solid transparent;
            cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none; color: white; outline: none;
        }
        .app-card:focus, .app-card:hover {
            transform: scale(1.2); background: rgba(255,255,255,0.12);
            border: 2px solid var(--focus); box-shadow: 0 0 40px rgba(59, 130, 246, 0.6);
        }
        .app-icon { border-radius: 20px; object-fit: cover; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .app-name { margin-top: 15px; font-weight: 600; letter-spacing: 1px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div class="tv-grid" id="tvGrid"></div>
    <script>
        const API = 'api.php'; // ✅ सीधे api.php
        async function loadTV() {
            try {
                const res = await fetch(API);
                const data = await res.json();
                const grid = document.getElementById('tvGrid');
                grid.innerHTML = '';
                data.apps.forEach(app => {
                    grid.innerHTML += `
                        <a href="${app.link}" class="app-card" tabindex="0">
                            <img src="${app.icon}" class="app-icon" style="width:${data.settings.iconSize}px; height:${data.settings.iconSize}px;">
                            <span class="app-name" style="font-size:${data.settings.textSize}px;">${app.name}</span>
                        </a>`;
                });
            } catch (e) { console.log("Load Error"); }
        }
        loadTV();
        setInterval(loadTV, 5000); // 5 सेकंड में ऑटो-अपडेट
    </script>
</body>
</html>
